keys:
  - &isabel 

  - &minerva 
  - &skadi 
  - &athena 
  - &aphrodite 
  - &isis 
  - &freyja 

creation_rules:
  - path_regex: secrets/isabel\.yaml
    key_groups:
      - age:
          - *isabel

  - path_regex: secrets/services/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *isabel
          - *minerva
          - *skadi
          - *athena
          - *aphrodite
          - *isis
          - *freyja
