name: Lix Diff

on:
  pull_request:

permissions: {}

jobs:
  lix-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Lix
        uses: ./.github/actions/install-lix

      - name: Get Hosts
        id: hosts
        run: |
          set -euo pipefail
          {
            echo "attributes<<EOF"
            # shellcheck disable=SC2016
            nix eval --impure --json --expr '
              let
                flake = import ./. { };
                mk = attr: toplevel:
                  map (name: {
                    displayName = name;
                    attribute = "${attr}.${name}.${toplevel}";
                  }) (builtins.attrNames (flake.${attr} or {}));
              in
                mk "nixosConfigurations" "config.system.build.toplevel"
                ++ mk "darwinConfigurations" "system"
              '
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run lix-diff
        uses: isabelroses/lix-diff-action@813069195be03ebafecaf0ad00823b853baf1057 # main
        with:
          attributes: ${{ steps.hosts.outputs.attributes }}
          comment-strategy: update

  nix-eval-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Lix
        uses: ./.github/actions/install-lix

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Discover hosts
        id: hosts
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          nix eval --impure --json --expr '
            let
              flake = import ./. { };
              mk = attr: toplevel:
                map (name: {
                  inherit name;
                  attribute = "${attr}.${name}.${toplevel}";
                }) (builtins.attrNames (flake.${attr} or {}));
            in
              mk "nixosConfigurations" "config.system.build.toplevel"
            ' > hosts.json
          jq -r '.[] | .name' hosts.json

      - name: Eval stats (before)
        working-directory: base
        run: |
          set -euo pipefail
          mkdir -p ../stats-before/all
          while IFS=$'\t' read -r name attr; do
            echo "::group::eval before: $name"
            NIX_SHOW_STATS=1 NIX_SHOW_STATS_PATH="../stats-before/all/${name}.json" \
              nix eval --no-eval-cache --file default.nix "${attr}" --option pure-eval true > /dev/null || \
              echo "warning: eval failed for $name (before)"
            echo "::endgroup::"
          done < <(jq -r '.[] | "\(.name)\t\(.attribute)"' ../hosts.json)

      - name: Eval stats (after)
        run: |
          set -euo pipefail
          mkdir -p stats-after/all
          while IFS=$'\t' read -r name attr; do
            echo "::group::eval after: $name"
            NIX_SHOW_STATS=1 NIX_SHOW_STATS_PATH="stats-after/all/${name}.json" \
              nix eval --no-eval-cache --file default.nix "${attr}" --option pure-eval true > /dev/null || \
              echo "warning: eval failed for $name (after)"
            echo "::endgroup::"
          done < <(jq -r '.[] | "\(.name)\t\(.attribute)"' hosts.json)

      - name: Compare stats
        run: |
          set -euo pipefail
          cmp_stats="$(nix build --file default.nix packages.cmp-stats --option pure-eval true --no-link --print-out-paths)/bin/cmp-stats"
          {
            echo "<!-- nix-eval-stats -->"
            echo "## Nix Eval Stats"
            echo
            echo "Paired comparison across $(jq 'length' hosts.json) host(s). Metrics with identical values across all hosts are listed under _Unchanged_; the rest get a paired t-test (p-value, t-stat)."
            echo
            "$cmp_stats" --explain stats-before stats-after
          } > stats-table.md

      - name: Post comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('stats-table.md', 'utf8');
            const marker = '<!-- nix-eval-stats -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

