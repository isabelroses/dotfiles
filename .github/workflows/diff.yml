name: Lix Diff

on:
  pull_request:

permissions: {}

jobs:
  lix-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c # v2026-02-22
        with:
          extra_nix_config: |
            substituters = https://nix-community.cachix.org https://catppuccin.cachix.org https://cache.nixos.org/ https://cache.tgirl.cloud/tgirlcloud/
            trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= catppuccin.cachix.org-1:noG/4HkbhJb+lUAdKrph6LaozJvAeEEZj4N732IysmU= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= tgirlcloud:EaOlHrpuOI6Zwmir3/MzqS9uA0Xn3gYr15/k/v0HIPo=

      - name: Get Hosts
        id: hosts
        run: |
          set -euo pipefail
          {
            echo "attributes<<EOF"
            # shellcheck disable=SC2016
            nix eval --impure --json --expr '
              let
                flake = (builtins.getFlake (toString ./.)).outputs;
                mk = attr: toplevel:
                  map (name: {
                    displayName = name;
                    attribute = "${attr}.${name}.${toplevel}";
                  }) (builtins.attrNames (flake.${attr} or {}));
              in
                mk "nixosConfigurations" "config.system.build.toplevel"
                ++ mk "darwinConfigurations" "system"
              '
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run lix-diff
        uses: isabelroses/lix-diff-action@a3db1f293b554fb2918d1b39fd31f1e085a56a35 # main
        with:
          attributes: ${{ steps.hosts.outputs.attributes }}
          comment-strategy: update

  nix-eval-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c # v2026-02-22
        with:
          extra_nix_config: |
            substituters = https://nix-community.cachix.org https://catppuccin.cachix.org https://cache.nixos.org/ https://cache.tgirl.cloud/tgirlcloud/
            trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= catppuccin.cachix.org-1:noG/4HkbhJb+lUAdKrph6LaozJvAeEEZj4N732IysmU= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= tgirlcloud:EaOlHrpuOI6Zwmir3/MzqS9uA0Xn3gYr15/k/v0HIPo=

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Eval stats (before)
        working-directory: base
        run: |
          attr=.#nixosConfigurations.amaterasu.config.system.build.toplevel
          nix eval "$attr" > /dev/null
          for i in $(seq 1 5); do
            NIX_SHOW_STATS=1 NIX_SHOW_STATS_PATH="../stats-before-$i.json" \
              nix eval --no-eval-cache "$attr" > /dev/null
          done

      - name: Eval stats (after)
        run: |
          attr=.#nixosConfigurations.amaterasu.config.system.build.toplevel
          nix eval "$attr" > /dev/null
          for i in $(seq 1 5); do
            NIX_SHOW_STATS=1 NIX_SHOW_STATS_PATH="stats-after-$i.json" \
              nix eval --no-eval-cache "$attr" > /dev/null
          done

      - name: Generate stats table
        run: |
          python3 << 'PYEOF'
          import json
          import statistics

          def flatten(d, prefix=''):
              result = {}
              for k, v in d.items():
                  if isinstance(v, dict):
                      result.update(flatten(v, f'{prefix}{k}.'))
                  elif isinstance(v, (int, float)):
                      result[f'{prefix}{k}'] = v
              return result

          def load_runs(pattern, count=5):
              runs = []
              for i in range(1, count + 1):
                  with open(pattern.format(i)) as f:
                      runs.append(flatten(json.load(f)))
              return runs

          def average_runs(runs):
              all_keys = set()
              for r in runs:
                  all_keys.update(r.keys())
              result = {}
              for k in all_keys:
                  values = [r[k] for r in runs if k in r]
                  result[k] = statistics.mean(values)
              return result

          def stddev_runs(runs):
              all_keys = set()
              for r in runs:
                  all_keys.update(r.keys())
              result = {}
              for k in all_keys:
                  values = [r[k] for r in runs if k in r]
                  result[k] = statistics.stdev(values) if len(values) > 1 else 0
              return result

          before_runs = load_runs('stats-before-{}.json')
          after_runs = load_runs('stats-after-{}.json')

          before = average_runs(before_runs)
          after = average_runs(after_runs)
          before_sd = stddev_runs(before_runs)
          after_sd = stddev_runs(after_runs)

          all_keys = sorted(set(before) | set(after))

          def fmt(n):
              return f'{n:.3f}' if isinstance(n, float) else f'{int(n):,}'

          lines = [
              '| Metric | Before (mean ± σ) | After (mean ± σ) | Δ | % |',
              '|--------|-------------------|------------------|---|---|',
          ]
          for key in all_keys:
              b = before.get(key, 0)
              a = after.get(key, 0)
              bs = before_sd.get(key, 0)
              as_ = after_sd.get(key, 0)
              diff = a - b
              pct = f'{diff / b * 100:+.1f}%' if b != 0 else 'N/A'
              sign = '+' if diff > 0 else ''
              lines.append(f'| `{key}` | {fmt(b)} ± {fmt(bs)} | {fmt(a)} ± {fmt(as_)} | {sign}{fmt(diff)} | {pct} |')

          table = '\n'.join(lines)
          with open('stats-table.md', 'w') as f:
              f.write(f'## Nix Eval Stats: `amaterasu`\n\n{table}\n')
          PYEOF

      - name: Post comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('stats-table.md', 'utf8');
            const marker = '## Nix Eval Stats: `amaterasu`';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

