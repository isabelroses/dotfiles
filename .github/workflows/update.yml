name: Bump npins Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "3 0 * * *" # run daily at 00:03 UTC

permissions: {}

jobs:
  update-sources:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Lix
        uses: ./.github/actions/install-lix

      - name: Update sources & open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_UPDATES }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config user.name "bell's bot"
          git config user.email "bot@isabelroses.com"

          nix-shell --run 'npins update'

          if git diff --quiet -- npins/sources.json; then
            echo "sources already up to date"
            exit 0
          fi

          branch="update-npins-sources"
          git switch -C "$branch"
          git commit -am "npins: update sources"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${branch}"

          url="$(gh pr view "$branch" --json url --jq .url 2>/dev/null || true)"
          if [ -z "$url" ]; then
            url="$(gh pr create \
              --title "npins: update sources" \
              --body "Automated npins source update." \
              --base main \
              --head "$branch")"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Wait for Checks & Merge
        if: steps.pr.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_UPDATES }}
          PR: ${{ steps.pr.outputs.url }}
        run: |
          # we can't instantly check for ci status or it errors; so lets horribly wait then
          # then check and watch ci status then merge
          sleep 30
          gh pr checks "$PR" --watch --fail-fast
          gh pr merge --rebase --delete-branch "$PR"
